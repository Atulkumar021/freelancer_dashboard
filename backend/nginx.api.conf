server {
    listen 80;
    server_name api.consultara.co.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.consultara.co.in;

    # SSL — update paths to your actual cert files
    ssl_certificate     /etc/letsencrypt/live/api.consultara.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.consultara.co.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        # ── Proxy to Express (Express handles all CORS dynamically) ──────
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward the Origin header so Express can validate it
        proxy_set_header   Origin            $http_origin;

        # Pass CORS headers set by Express through to the browser unchanged
        proxy_pass_header  Access-Control-Allow-Origin;
        proxy_pass_header  Access-Control-Allow-Credentials;
        proxy_pass_header  Access-Control-Allow-Methods;
        proxy_pass_header  Access-Control-Allow-Headers;
    }
}
