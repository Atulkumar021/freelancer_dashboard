server {
    listen 80;
    server_name api.consultara.co.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.consultara.co.in;

    # SSL — update paths to your actual cert files
    ssl_certificate     /etc/letsencrypt/live/api.consultara.co.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.consultara.co.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        # ── CORS preflight ── handled here so nginx never blocks OPTIONS ──
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'      'https://dashboard.consultara.co.in' always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age'           86400 always;
            return 204;
        }

        # ── Proxy to Express ─────────────────────────────────────────────
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pass CORS headers from Express through to the browser
        add_header 'Access-Control-Allow-Origin'      'https://dashboard.consultara.co.in' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }
}
